<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สร้างนิยาย - EduVerse AI</title>

<style>
body{
background-image:url("https://i.ibb.co/DDvMfyMy/7-C7-CB1-DD-FEC2-447-D-B903-4998-AAB37-A66.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
min-height:100vh;
}

.box{
  background:rgba(255,255,255,0.15);
  color:white;
  padding:40px;
  border-radius:25px;
  max-width:700px;
  margin:auto;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3);
}

select,input{
  width:80%;
  padding:12px;
  margin:10px;
  border-radius:10px;
}

button{
  padding:15px 30px;
  border-radius:30px;
  border:none;
  background:#4F46E5;
  color:white;
  font-size:18px;
}
</style>

</head>

<body>

<h1>✨ สร้างนิยายด้วย AI</h1>

<div class="box">

<h2>เลือกบทเรียนของคุณ</h2>

<select>
<option>วิทยาศาสตร์</option>
<option>คณิตศาสตร์</option>
<option>ภาษาอังกฤษ</option> 
<option>ภาษาไทย</option>
<br>

<input placeholder="หัวข้อบทเรียน">

<br>

<select>
<option>แฟนตาซี</option>
<option>ผจญภัย</option>
<option>โลกอนาคต</option>
</select>

<br>

<button>
✨ สร้างนิยาย
</button>

</div>

</body>
</html>
