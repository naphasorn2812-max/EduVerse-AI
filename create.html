<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สร้างนิยาย - EduVerse AI</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}


body{

background-image:url("https://i.ibb.co/DDvMfyMy/7-C7-CB1-DD-FEC2-447-D-B903-4998-AAB37-A66.png");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
min-height:100vh;
padding:40px 20px;

}



.container{

max-width:800px;
margin:auto;

}



h1{

text-align:center;
font-size:45px;
margin-bottom:30px;

}



.box{

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);

border-radius:25px;

padding:35px;

margin-bottom:30px;

}



label{

font-size:18px;

}



input,select{

width:100%;

padding:12px;

margin:10px 0 20px;

border-radius:15px;

border:none;

font-size:16px;

}



button{

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:white;

color:#4F46E5;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.03);

}



#result{

display:none;

}



.story{

background:rgba(255,255,255,0.12);

padding:25px;

border-radius:20px;

line-height:1.8;

}


.loading{

text-align:center;

font-size:20px;

display:none;

}


</style>

</head>



<body>


<div class="container">


<h1>✨ สร้างนิยายด้วย EduVerse AI</h1>



<div class="box">


<label>📚 เลือกวิชา</label>

<select id="subject">

<option>วิทยาศาสตร์</option>
<option>คณิตศาสตร์</option>
<option>ภาษาอังกฤษ</option>
<option>ประวัติศาสตร์</option>

</select>



<label>📝 หัวข้อบทเรียน</label>

<input id="topic" placeholder="เช่น ระบบสุริยะ">



<label>🎭 เลือกแนวนิยาย</label>

<select id="style">

<option>แฟนตาซี</option>
<option>ผจญภัย</option>
<option>โลกอนาคต</option>

</select>



<button onclick="createStory()">
✨ สร้างนิยาย
</button>


</div>




<div class="box loading" id="loading">

🤖 EduVerse AI กำลังวิเคราะห์บทเรียน...

</div>




<div class="box" id="result">


<h2>🧠 ผลการวิเคราะห์ของ AI</h2>

<p id="analysis"></p>


<br>


<h2>📖 นิยายที่สร้างโดย AI</h2>


<div class="story" id="story">

</div>
<div class="story" id="story">

</div>

<button onclick="saveStory()" style="margin-top:20px;">
📚 บันทึกลงคลังนิยาย
</button>
</div>



</div>




<script>

  function saveStory(){

let storyData = {

subject: document.getElementById("subject").value,

topic: document.getElementById("topic").value,

style: document.getElementById("style").value,

date: new Date().toLocaleDateString("th-TH")

};


localStorage.setItem(
"savedStory",
JSON.stringify(storyData)
);


alert("✅ บันทึกนิยายลงคลังเรียบร้อยแล้ว");


}
  
function createStory(){


let subject=document.getElementById("subject").value;

let topic=document.getElementById("topic").value;

let style=document.getElementById("style").value;



if(topic==""){

alert("กรุณาใส่หัวข้อบทเรียน");

return;

}



document.getElementById("loading").style.display="block";

document.getElementById("result").style.display="none";



setTimeout(()=>{


document.getElementById("loading").style.display="none";

document.getElementById("result").style.display="block";



document.getElementById("analysis").innerHTML=

`
📌 วิชา: ${subject}<br>
📌 หัวข้อ: ${topic}<br>
📌 แนวการเรียนรู้: ${style}<br><br>

AI วิเคราะห์ว่าเนื้อหานี้เหมาะสำหรับ
การเรียนรู้ผ่านเรื่องราวและสถานการณ์จำลอง
เพื่อช่วยให้ผู้เรียนเข้าใจแนวคิดสำคัญได้ง่ายขึ้น
`;




document.getElementById("story").innerHTML=

`
🌌 <b>การผจญภัยของผู้เรียนในโลก ${topic}</b><br><br>

ตัวละครหลักได้รับภารกิจสำคัญ
ในการค้นหาความรู้เกี่ยวกับ ${topic}

ระหว่างการเดินทาง เขาได้พบกับบทเรียนต่าง ๆ
ที่ช่วยให้เข้าใจ ${subject}
ผ่านโลกแห่ง ${style}

EduVerse AI เปลี่ยนบทเรียนธรรมดา
ให้กลายเป็นประสบการณ์การเรียนรู้ที่น่าจดจำ

`;



},2000);



}

</script>


</body>

</html>
